{% extends 'orders/base.html' %}

{% block title %}Панель администратора БД — Столовая МПТ{% endblock %}

{% block content %}
<style>
    body {
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        min-height: 100vh;
    }

    .background {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at 20% 20%, rgba(237, 137, 54, 0.12) 0%, transparent 40%),
                    radial-gradient(circle at 80% 80%, rgba(255, 107, 53, 0.1) 0%, transparent 40%);
        z-index: -2;
    }

    .db-admin-wrapper {
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
    }

    .db-admin-card {
        background: linear-gradient(145deg, rgba(255, 255, 255, 0.95) 0%, rgba(255, 248, 240, 0.95) 100%);
        border-radius: 24px;
        padding: 40px;
        box-shadow: 0 25px 80px rgba(0, 0, 0, 0.2);
        position: relative;
        overflow: hidden;
        animation: slideUp 0.6s ease-out;
    }

    .db-admin-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, #ed8936 0%, #dd6b20 100%);
    }

    .db-admin-header {
        text-align: center;
        margin-bottom: 35px;
    }

    .db-admin-icon {
        width: 90px;
        height: 90px;
        border-radius: 50%;
        background: linear-gradient(135deg, #ed8936 0%, #dd6b20 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5rem;
        margin: 0 auto 20px;
        box-shadow: 0 10px 30px rgba(237, 137, 54, 0.4);
    }

    .db-admin-title {
        font-size: 1.8rem;
        font-weight: 700;
        color: #2d3748;
        margin: 0 0 8px 0;
    }

    .db-admin-subtitle {
        color: #718096;
        font-size: 0.95rem;
    }

    .db-admin-menu {
        display: grid;
        gap: 15px;
    }

    .db-admin-link {
        display: flex;
        align-items: center;
        gap: 15px;
        padding: 18px 22px;
        background: #f7fafc;
        border-radius: 14px;
        text-decoration: none;
        color: #2d3748;
        font-weight: 600;
        font-size: 1.05rem;
        transition: all 0.3s ease;
        border: 2px solid transparent;
    }

    .db-admin-link:hover {
        background: white;
        border-color: #ed8936;
        transform: translateX(8px);
        box-shadow: 0 5px 20px rgba(237, 137, 54, 0.15);
    }

    .link-icon {
        width: 45px;
        height: 45px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.4rem;
    }

    .icon-users { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .icon-dishes { background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%); }
    .icon-orders { background: linear-gradient(135deg, #48bb78 0%, #38a169 100%); }

    .link-text {
        flex: 1;
    }

    .link-arrow {
        color: #a0aec0;
        font-size: 1.2rem;
        transition: transform 0.3s ease;
    }

    .db-admin-link:hover .link-arrow {
        transform: translateX(5px);
        color: #ed8936;
    }

    .main-card {
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
    }

    /* Светлая тема */
    html[data-theme="light"] body {
        background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 50%, #d9dde2 100%);
        min-height: 100vh;
    }

    html[data-theme="light"] .background {
        background: radial-gradient(circle at 20% 20%, rgba(237, 137, 54, 0.06) 0%, transparent 40%),
                    radial-gradient(circle at 80% 80%, rgba(255, 107, 53, 0.04) 0%, transparent 40%);
    }

    html[data-theme="light"] .db-admin-card {
        background: linear-gradient(145deg, rgba(255, 255, 255, 0.98) 0%, rgba(255, 248, 240, 0.98) 100%);
        box-shadow: 0 25px 80px rgba(0, 0, 0, 0.08), 0 10px 30px rgba(0, 0, 0, 0.06);
    }

    html[data-theme="light"] .db-admin-title {
        color: #1a202c;
    }

    html[data-theme="light"] .db-admin-subtitle {
        color: #4a5568;
    }

    html[data-theme="light"] .db-admin-link {
        background: #f7fafc;
        color: #2d3748;
        border-color: #e2e8f0;
    }

    html[data-theme="light"] .db-admin-link:hover {
        background: white;
        box-shadow: 0 8px 25px rgba(237, 137, 54, 0.2);
    }

    .db-admin-footer {
        margin-top: 30px;
        text-align: center;
        padding-top: 20px;
        border-top: 1px solid rgba(226, 232, 240, 0.3);
    }

    .btn-back-to-profile {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 12px 24px;
        background: linear-gradient(135deg, #4a5568 0%, #2d3748 100%);
        color: white;
        border-radius: 12px;
        text-decoration: none;
        font-weight: 600;
        font-size: 0.95rem;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(74, 85, 104, 0.3);
    }

    .btn-back-to-profile:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(74, 85, 104, 0.4);
        background: linear-gradient(135deg, #2d3748 0%, #1a202c 100%);
    }

    .btn-icon {
        font-size: 1.1rem;
    }

    .btn-text {
        font-size: 0.95rem;
    }

    /* Светлая тема для кнопки */
    html[data-theme="light"] .db-admin-footer {
        border-top-color: rgba(226, 232, 240, 0.6);
    }

    html[data-theme="light"] .btn-back-to-profile {
        background: linear-gradient(135deg, #718096 0%, #4a5568 100%);
        box-shadow: 0 4px 15px rgba(113, 128, 150, 0.3);
    }

    html[data-theme="light"] .btn-back-to-profile:hover {
        background: linear-gradient(135deg, #4a5568 0%, #2d3748 100%);
        box-shadow: 0 8px 25px rgba(74, 85, 104, 0.3);
    }

    @keyframes slideUp {
        from { opacity: 0; transform: translateY(40px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

<div class="db-admin-wrapper">
    <div class="db-admin-card">
        <div class="db-admin-header">
            <div class="db-admin-icon">⚙️</div>
            <h1 class="db-admin-title">Панель администратора БД</h1>
            <p class="db-admin-subtitle">Управление данными системы</p>
        </div>

        <div class="db-admin-menu">
            <a href="{% url 'db_admin_users' %}" class="db-admin-link">
                <div class="link-icon icon-users">👥</div>
                <span class="link-text">Пользователи</span>
                <span class="link-arrow">→</span>
            </a>
            <a href="{% url 'db_admin_menu_items' %}" class="db-admin-link">
                <div class="link-icon icon-dishes">🍽️</div>
                <span class="link-text">Блюда меню</span>
                <span class="link-arrow">→</span>
            </a>
            <a href="{% url 'db_admin_orders' %}" class="db-admin-link">
                <div class="link-icon icon-orders">📋</div>
                <span class="link-text">Заказы</span>
                <span class="link-arrow">→</span>
            </a>
        </div>
        
        <div class="db-admin-footer">
            <a href="{% url 'profile' %}" class="btn-back-to-profile">
                <span class="btn-icon">👤</span>
                <span class="btn-text">Вернуться в профиль</span>
            </a>
        </div>
    </div>
</div>
{% endblock %}
