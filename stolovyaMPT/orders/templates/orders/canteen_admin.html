{% extends 'orders/base.html' %}

{% block title %}Панель администратора — Столовая МПТ{% endblock %}

{% block content %}
<style>
    body {
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        min-height: 100vh;
    }

    .background {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at 30% 30%, rgba(102, 126, 234, 0.15) 0%, transparent 40%),
                    radial-gradient(circle at 70% 70%, rgba(118, 75, 162, 0.1) 0%, transparent 40%);
        z-index: -2;
    }

    .admin-wrapper {
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
    }

    .admin-card {
        background: linear-gradient(145deg, rgba(255, 255, 255, 0.95) 0%, rgba(255, 248, 240, 0.95) 100%);
        border-radius: 24px;
        padding: 40px;
        box-shadow: 0 25px 80px rgba(0, 0, 0, 0.2);
        position: relative;
        overflow: hidden;
        animation: slideUp 0.6s ease-out;
    }

    .admin-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
    }

    .admin-header {
        text-align: center;
        margin-bottom: 35px;
    }

    .admin-icon {
        width: 90px;
        height: 90px;
        border-radius: 50%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5rem;
        margin: 0 auto 20px;
        box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }

    .admin-title {
        font-size: 1.8rem;
        font-weight: 700;
        color: #2d3748;
        margin: 0 0 8px 0;
    }

    .admin-subtitle {
        color: #718096;
        font-size: 0.95rem;
    }

    .admin-menu {
        display: grid;
        gap: 15px;
    }

    .admin-link {
        display: flex;
        align-items: center;
        gap: 15px;
        padding: 18px 22px;
        background: #f7fafc;
        border-radius: 14px;
        text-decoration: none;
        color: #2d3748;
        font-weight: 600;
        font-size: 1.05rem;
        transition: all 0.3s ease;
        border: 2px solid transparent;
    }

    .admin-link:hover {
        background: white;
        border-color: #667eea;
        transform: translateX(8px);
        box-shadow: 0 5px 20px rgba(102, 126, 234, 0.15);
    }

    .link-icon {
        width: 45px;
        height: 45px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.4rem;
    }

    .icon-profile { background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%); }
    .icon-orders { background: linear-gradient(135deg, #48bb78 0%, #38a169 100%); }
    .icon-menu { background: linear-gradient(135deg, #ed8936 0%, #dd6b20 100%); }

    .link-text {
        flex: 1;
    }

    .link-arrow {
        color: #a0aec0;
        font-size: 1.2rem;
        transition: transform 0.3s ease;
    }

    .admin-link:hover .link-arrow {
        transform: translateX(5px);
        color: #667eea;
    }

    .main-card {
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
    }

    @keyframes slideUp {
        from { opacity: 0; transform: translateY(40px); }
        to { opacity: 1; transform: translateY(0); }
    }

    html[data-theme="light"] body {
        background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 50%, #d9dde2 100%);
    }

    html[data-theme="light"] .background {
        background: radial-gradient(circle at 30% 30%, rgba(102, 126, 234, 0.08) 0%, transparent 40%),
                    radial-gradient(circle at 70% 70%, rgba(118, 75, 162, 0.05) 0%, transparent 40%);
    }

    html[data-theme="light"] .admin-card {
        background: linear-gradient(145deg, rgba(255,255,255,0.98) 0%, rgba(255,248,240,0.98) 100%);
        box-shadow: 0 25px 80px rgba(0,0,0,0.08);
    }

    html[data-theme="light"] .admin-title {
        color: #1a202c;
    }

    html[data-theme="light"] .admin-subtitle {
        color: #4a5568;
    }

    html[data-theme="light"] .admin-link {
        background: #edf2f7;
        color: #1a202c;
    }

    html[data-theme="light"] .admin-link:hover {
        background: #ffffff;
    }
</style>

<div class="admin-wrapper">
    <div class="admin-card">
        <div class="admin-header">
            <div class="admin-icon">👨‍🍳</div>
            <h1 class="admin-title">Панель администратора</h1>
            <p class="admin-subtitle">Управление столовой МПТ</p>
        </div>

        <div class="admin-menu">
            <a href="{% url 'profile' %}" class="admin-link">
                <div class="link-icon icon-profile">👤</div>
                <span class="link-text">Мой профиль</span>
                <span class="link-arrow">→</span>
            </a>
            <a href="{% url 'orders' %}" class="admin-link">
                <div class="link-icon icon-orders">📋</div>
                <span class="link-text">Окно заказов</span>
                <span class="link-arrow">→</span>
            </a>
            <a href="{% url 'menu' %}" class="admin-link">
                <div class="link-icon icon-menu">🍽️</div>
                <span class="link-text">Окно меню</span>
                <span class="link-arrow">→</span>
            </a>
        </div>
    </div>
</div>
{% endblock %}
