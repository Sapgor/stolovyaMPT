{% extends 'orders/base.html' %}

{% block title %}Слишком много запросов — Столовая МПТ{% endblock %}

{% block content %}
<style>
    body {
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        min-height: 100vh;
    }

    .background {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at 50% 50%, rgba(237, 137, 54, 0.15) 0%, transparent 40%);
        z-index: -2;
    }

    .error-wrapper {
        max-width: 450px;
        margin: 0 auto;
        padding: 20px;
        min-height: 70vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .error-card {
        background: linear-gradient(145deg, rgba(255, 255, 255, 0.95) 0%, rgba(255, 248, 240, 0.95) 100%);
        border-radius: 24px;
        padding: 50px 40px;
        box-shadow: 0 25px 80px rgba(0, 0, 0, 0.2);
        text-align: center;
        position: relative;
        overflow: hidden;
        animation: slideUp 0.6s ease-out;
    }

    .error-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, #ed8936 0%, #dd6b20 100%);
    }

    .error-icon {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        background: linear-gradient(135deg, #feebc8 0%, #fbd38d 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3.5rem;
        margin: 0 auto 25px;
        animation: pulse 2s infinite;
    }

    .error-title {
        font-size: 1.6rem;
        font-weight: 700;
        color: #c05621;
        margin: 0 0 15px 0;
    }

    .error-text {
        color: #718096;
        font-size: 1rem;
        line-height: 1.6;
        margin-bottom: 30px;
    }

    .timer {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 12px 24px;
        background: #f7fafc;
        border-radius: 12px;
        color: #4a5568;
        font-weight: 600;
        margin-bottom: 25px;
    }

    .btn-menu {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 14px 28px;
        background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
        color: white;
        border-radius: 12px;
        text-decoration: none;
        font-weight: 600;
        font-size: 1rem;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(255, 107, 53, 0.4);
    }

    .btn-menu:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(255, 107, 53, 0.5);
    }

    .main-card {
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
    }

    @keyframes slideUp {
        from { opacity: 0; transform: translateY(40px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
    }
</style>

<div class="error-wrapper">
    <div class="error-card">
        <div class="error-icon">⏱️</div>
        <h1 class="error-title">Слишком много запросов</h1>
        <p class="error-text">Вы превысили лимит запросов. Пожалуйста, подождите немного перед повторной попыткой.</p>
        <div class="timer">⏳ 60 секунд</div>
        <div>
            <a href="{% url 'menu' %}" class="btn-menu">🍽️ Вернуться в меню</a>
        </div>
    </div>
</div>
{% endblock %}
